services:
  - type: web
    name: spa-api-server
    runtime: node
    repo: https://github.com/peddireddychandana/spa
    rootDir: spa
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: "10000"

  - type: web
    name: spa-mockup-sandbox
    runtime: static
    repo: https://github.com/peddireddychandana/spa
    rootDir: spa
    buildCommand: pnpm install && pnpm --filter @workspace/mockup-sandbox run build
    staticPublishPath: artifacts/mockup-sandbox/dist
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: BASE_PATH
        value: /

  - type: web
    name: spa-frontend
    runtime: static
    repo: https://github.com/peddireddychandana/spa
    rootDir: spa/frontend
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://spa-prdtr.onrender.com
