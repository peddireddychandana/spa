services:
  - type: web
    name: spa-api-server
    runtime: node
    repo: https://github.com/peddireddychandana/spa
    rootDir: spa
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: cd artifacts/api-server && node --enable-source-maps ./dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production

  - type: web
    name: spa-mockup-sandbox
    runtime: static
    repo: https://github.com/peddireddychandana/spa
    rootDir: spa
    buildCommand: pnpm install && pnpm --filter @workspace/mockup-sandbox run build
    staticPublishPath: artifacts/mockup-sandbox/dist
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: "10001"
      - key: BASE_PATH
        value: /
